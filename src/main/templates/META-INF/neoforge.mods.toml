modLoader = "javafml"
loaderVersion = "${loader_version_range}"

license = "${mod_license}"
issueTrackerURL="${mod_issues_url}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
# A URL to query for updates for this mod. See the JSON update specification https://docs.neoforge.net/docs/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #optional
displayURL="${mod_url}"
logoFile="icon.png"
#credits=""
authors = "${mod_authors}"
description = '''${mod_description}'''

# The [[accessTransformers]] block allows you to declare where your AT file is.
# If this block is omitted, a fallback attempt will be made to load an AT from META-INF/accesstransformer.cfg
#[[accessTransformers]]
#file="META-INF/accesstransformer.cfg"

# The coremods config file path is not configurable and is always loaded from META-INF/coremods.json

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Mystical Agriculture
[[dependencies."${mod_id}"]]
modId="mysticalagriculture"
type="required"
versionRange="[9.0.3,9.1)"
ordering="AFTER"

# Cucumber
[[dependencies."${mod_id}"]]
modId="cucumber"
type="required"
reason="Dependency for Mystical Agriculture."
versionRange="[9.0.3,9.1)"
ordering="AFTER"

# Mystical Agradditions
[[dependencies."${mod_id}"]]
modId="mysticalagradditions"
type="optional"
reason="Optional support for insanium."
versionRange="[9.0.0,9.1)"
ordering="AFTER"

# JEI
[[dependencies."${mod_id}"]]
modId="jei"
type="optional"
versionRange="[29.6.2.31,29.6.3)"
side="CLIENT"

# JADE
[[dependencies."${mod_id}"]]
modId="jade"
type="optional"
versionRange="[26.1.3,26.2)"

# Features are specific properties of the game environment, that you may want to declare you require. This example declares
# that your mod requires GL version 3.2 or higher. Other features will be added. They are side aware so declaring this won't
# stop your mod loading on the server for example.
#[features."${mod_id}"]
#openGLVersion="[3.2,)"

